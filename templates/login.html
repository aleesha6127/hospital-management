<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hospital Management Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0d6efd, #20c997);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", sans-serif;
        }

        .login-card {
            max-width: 420px;
            width: 100%;
            border-radius: 14px;
            overflow: hidden;
        }

        .login-header {
            background: #0d6efd;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .login-header h4 {
            margin: 0;
            font-weight: 600;
        }

        .login-body {
            padding: 25px;
            background: white;
        }

        .role-btn {
            width: 100%;
        }

        .medical-icon {
            font-size: 40px;
        }
    </style>
</head>

<body>

<div class="card shadow login-card">

    <!-- HEADER -->
    <div class="login-header">
        <div class="medical-icon">🏥</div>
        <h4>Hospital Management System</h4>
        <small>Secure Medical Portal</small>
    </div>

    <!-- BODY -->
    <div class="login-body">

        {% if error %}
            <div class="alert alert-danger text-center">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">

            <!-- ROLE SELECTION -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Login As</label>
                <select name="role" class="form-select" required>
                    <option value="">-- Select Role --</option>
                    <option value="admin">Administrator</option>
                    <option value="hospital">Hospital</option>
                </select>
            </div>

            <!-- USERNAME -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Enter username"
                       required>
            </div>

            <!-- PASSWORD -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter password"
                       required>
            </div>

            <!-- LOGIN BUTTON -->
            <button class="btn btn-primary w-100 fw-semibold">
                Login Securely
            </button>

        </form>

        <!-- FOOTER -->
        <div class="text-center mt-4 text-muted small">
            © {{ 2026 }} Hospital Management System
        </div>

    </div>
</div>

</body>
</html>
