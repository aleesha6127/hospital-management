<!DOCTYPE html>
<html>
<head>
    <title>Add Doctor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container py-4">

<h3 class="mb-4">Add Doctor</h3>

<form method="POST">

    <div class="mb-3">
        <label class="form-label">Doctor Name</label>
        <input type="text" name="name" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Specialization</label>
        <input type="text" name="specialization" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Department</label>
        <select name="department" class="form-select" required>
            {% for d in departments %}
                <option value="{{ d.to_dict().name }}">
                    {{ d.to_dict().name }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Timing</label>
        <input type="text" name="timing" class="form-control" placeholder="Morning / Evening">
    </div>

    <!-- 🔐 PASSWORD FIELD (NEW) -->
    <div class="mb-3">
        <label class="form-label">Doctor Login Password</label>
        <input type="password" name="password" class="form-control" required>
        <small class="text-muted">
            This password will be used by the doctor to log in.
        </small>
    </div>

    <button class="btn btn-success">Save Doctor</button>
    <a href="/hospital/dashboard" class="btn btn-secondary">Cancel</a>

</form>

</body>
</html>
