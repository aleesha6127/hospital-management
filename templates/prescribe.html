<!DOCTYPE html>
<html>
<head>
    <title>Prescription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container py-4">

<h4 class="mb-4">Prescription for {{ appointment.patient_name }}</h4>

<form method="POST">
    <div class="mb-3">
        <label class="form-label">Diagnosis</label>
        <textarea class="form-control" name="diagnosis" required></textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Medicines</label>
        <textarea class="form-control" name="medicines" placeholder="Paracetamol 500mg - 2 times a day" required></textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Advice</label>
        <textarea class="form-control" name="advice"></textarea>
    </div>

    <button class="btn btn-success">Save Prescription</button>
    <a href="/doctor/dashboard" class="btn btn-secondary">Cancel</a>
</form>

</body>
</html>
