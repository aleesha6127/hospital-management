<!DOCTYPE html>
<html>
<head>
    <title>Add Hospital</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

<h2>Add Hospital</h2>

<form method="POST" enctype="multipart/form-data">

    <input class="form-control mb-3" name="name" placeholder="Hospital Name" required>

    <input class="form-control mb-3" name="username" placeholder="Username" required>

    <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>

    <input class="form-control mb-3" name="contact" placeholder="Contact Number" required>

    <div class="row">
        <div class="col">
            <input class="form-control mb-3" name="latitude" placeholder="Latitude" required>
        </div>
        <div class="col">
            <input class="form-control mb-3" name="longitude" placeholder="Longitude" required>
        </div>
    </div>

    <label class="form-label">Hospital Image</label>
    <input class="form-control mb-3" type="file" name="image" required>

    <button class="btn btn-success">Add Hospital</button>

</form>

</body>
</html>
