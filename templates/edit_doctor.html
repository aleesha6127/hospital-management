<!DOCTYPE html>
<html>
<head>
    <title>Edit Doctor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h3>Edit Doctor</h3>

<form method="POST">

    <input class="form-control mb-3"
           name="name"
           value="{{ doctor.name }}"
           required>

    <input class="form-control mb-3"
           name="specialization"
           value="{{ doctor.specialization }}"
           required>

    <select class="form-control mb-3" name="department" required>
        {% for d in departments %}
            <option value="{{ d.to_dict().name }}"
                {% if d.to_dict().name == doctor.department %}selected{% endif %}>
                {{ d.to_dict().name }}
            </option>
        {% endfor %}
    </select>

    <input class="form-control mb-3"
           name="timing"
           value="{{ doctor.timing }}"
           required>

    <button class="btn btn-success">Update</button>
    <a href="/hospital/dashboard" class="btn btn-secondary">Cancel</a>

</form>

</body>
</html>
